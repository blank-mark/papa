<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VR Physics Sandbox</title>
    <meta name="theme-color" content="#0a1020" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.2.3/dist/aframe-physics-system.min.js"></script>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #06101b;
        overflow: hidden;
      }
      a-scene {
        width: 100%;
        height: 100%;
      }
    </style>
    <script>
      AFRAME.registerComponent('buoyancy', {
        schema: {
          width: { type: 'number', default: 6 },
          depth: { type: 'number', default: 6 },
          height: { type: 'number', default: 0.55 }
        },
        init: function () {
          this._p = new THREE.Vector3();
          this._w = new THREE.Vector3();
        },
        tick: function () {
          if (!this.el.body) return;

          const body = this.el.body;
          this.el.object3D.getWorldPosition(this._p);
          const water = document.querySelector('#water');
          if (!water) return;

          water.object3D.getWorldPosition(this._w);

          const halfW = this.data.width / 2;
          const halfD = this.data.depth / 2;
          const halfH = this.data.height / 2;
          const topY = this._w.y + halfH;

          const insideX = Math.abs(this._p.x - this._w.x) <= halfW;
          const insideZ = Math.abs(this._p.z - this._w.z) <= halfD;
          if (!insideX || !insideZ || this._p.y > topY) return;

          const submersion = Math.max(0, Math.min(1, (topY - this._p.y) / this.data.height));
          const lift = 9.8 * body.mass * (0.85 + submersion * 1.3);

          body.applyForce(new CANNON.Vec3(0, lift, 0), body.position);
          body.velocity.x *= 0.991;
          body.velocity.z *= 0.991;
          if (body.velocity.y < 0) body.velocity.y *= 0.92;
        }
      });

      AFRAME.registerComponent('grab-controller', {
        init: function () {
          this.holding = null;
          this.samples = [];
          this.lastSampleAt = 0;
          this.tmpPos = new THREE.Vector3();
          this.tmpPos2 = new THREE.Vector3();
          this.tmpQuat = new THREE.Quaternion();
          this.tmpDir = new THREE.Vector3();

          this.onGripDown = this.onGripDown.bind(this);
          this.onGripUp = this.onGripUp.bind(this);

          this.el.addEventListener('gripdown', this.onGripDown);
          this.el.addEventListener('gripup', this.onGripUp);
          this.el.addEventListener('triggerup', this.onGripUp);
        },
        remove: function () {
          this.el.removeEventListener('gripdown', this.onGripDown);
          this.el.removeEventListener('gripup', this.onGripUp);
          this.el.removeEventListener('triggerup', this.onGripUp);
        },
        tick: function () {
          this.el.object3D.getWorldPosition(this.tmpPos);

          const now = performance.now();
          if (now - this.lastSampleAt > 20) {
            this.samples.push({
              x: this.tmpPos.x,
              y: this.tmpPos.y,
              z: this.tmpPos.z,
              t: now
            });
            if (this.samples.length > 8) this.samples.shift();
            this.lastSampleAt = now;
          }

          if (this.holding) {
            this.holding.object3D.position.set(0, 0, -0.12);
            this.holding.object3D.rotation.set(0, 0, 0);
          }
        },
        getVelocity: function () {
          if (this.samples.length < 2) return new THREE.Vector3(0, 0, 0);
          const first = this.samples[0];
          const last = this.samples[this.samples.length - 1];
          const dt = (last.t - first.t) / 1000;
          if (dt <= 0) return new THREE.Vector3(0, 0, 0);
          return new THREE.Vector3(
            (last.x - first.x) / dt,
            (last.y - first.y) / dt,
            (last.z - first.z) / dt
          );
        },
        onGripDown: function () {
          if (this.holding) return;

          const scene = this.el.sceneEl;
          this.el.object3D.getWorldPosition(this.tmpPos);

          let nearest = null;
          let nearestDist = 0.25;

          scene.querySelectorAll('.grabbable').forEach((el) => {
            if (el === this.holding || el.dataset.held === '1' || el.dataset.locked === '1') return;
            el.object3D.getWorldPosition(this.tmpPos2);
            const dist = this.tmpPos.distanceTo(this.tmpPos2);
            if (dist < nearestDist) {
              nearest = el;
              nearestDist = dist;
            }
          });

          if (!nearest) return;

          this.holding = nearest;
          nearest.dataset.held = '1';
          nearest.removeAttribute('dynamic-body');

          this.el.object3D.attach(nearest.object3D);
          nearest.object3D.position.set(0, 0, -0.12);
          nearest.object3D.rotation.set(0, 0, 0);
        },
        onGripUp: function () {
          if (!this.holding) return;

          const held = this.holding;
          const scene = this.el.sceneEl;
          this.holding = null;
          delete held.dataset.held;

          const velocity = this.getVelocity().multiplyScalar(1.15);
          scene.object3D.attach(held.object3D);

          const pos = new THREE.Vector3();
          const quat = new THREE.Quaternion();
          held.object3D.getWorldPosition(pos);
          held.object3D.getWorldQuaternion(quat);

          held.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
          held.setAttribute('rotation', `${THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(quat).x)} ${THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(quat).y)} ${THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(quat).z)}`);

          held.setAttribute('dynamic-body', 'shape: box; mass: 1');

          setTimeout(() => {
            if (!held.body) return;
            held.body.velocity.set(velocity.x, velocity.y, velocity.z);
            held.body.angularVelocity.set(
              (Math.random() - 0.5) * 2,
              (Math.random() - 0.5) * 2,
              (Math.random() - 0.5) * 2
            );
          }, 50);

          this.samples.length = 0;
        }
      });

      AFRAME.registerComponent('spawn-tool', {
        schema: {
          mode: { type: 'string', default: 'random' }
        },
        init: function () {
          this.onTrigger = this.onTrigger.bind(this);
          this.el.addEventListener('triggerdown', this.onTrigger);
          this.el.addEventListener('abuttondown', this.onTrigger);
          this.el.addEventListener('xbuttondown', this.onTrigger);
        },
        remove: function () {
          this.el.removeEventListener('triggerdown', this.onTrigger);
          this.el.removeEventListener('abuttondown', this.onTrigger);
          this.el.removeEventListener('xbuttondown', this.onTrigger);
        },
        spawnEntity: function (shape, color) {
          const scene = this.el.sceneEl;
          const obj = document.createElement('a-entity');

          if (shape === 'box') {
            obj.setAttribute('geometry', 'primitive: box; width: 0.16; height: 0.16; depth: 0.16');
          } else if (shape === 'sphere') {
            obj.setAttribute('geometry', 'primitive: sphere; radius: 0.09');
          } else {
            obj.setAttribute('geometry', 'primitive: cylinder; radius: 0.07; height: 0.18');
          }

          obj.setAttribute('material', `color: ${color}; roughness: 0.65; metalness: 0.05`);
          obj.setAttribute('class', 'grabbable');
          obj.setAttribute('dynamic-body', 'shape: box; mass: 1');
          obj.setAttribute('buoyancy', '');
          obj.setAttribute('hoverable', '');
          obj.setAttribute('position', '0 1.5 -1');
          scene.appendChild(obj);

          const p = new THREE.Vector3();
          const d = new THREE.Vector3();
          this.el.object3D.getWorldPosition(p);
          this.el.object3D.getWorldDirection(d);
          p.add(d.multiplyScalar(0.35));
          obj.object3D.position.copy(p);

          setTimeout(() => {
            if (!obj.body) return;
            obj.body.velocity.set(d.x * 2.3, d.y * 2.3 + 0.3, d.z * 2.3);
            obj.body.angularVelocity.set(
              (Math.random() - 0.5) * 4,
              (Math.random() - 0.5) * 4,
              (Math.random() - 0.5) * 4
            );
          }, 80);
        },
        onTrigger: function () {
          const palette = ['#ff7d7d', '#ffd166', '#7bdff2', '#b8f2e6', '#cdb4db', '#f4a261'];
          const color = palette[(Math.random() * palette.length) | 0];
          const mode = this.data.mode;

          if (mode === 'box') {
            this.spawnEntity('box', color);
          } else if (mode === 'sphere') {
            this.spawnEntity('sphere', color);
          } else {
            const roll = Math.random();
            this.spawnEntity(roll < 0.5 ? 'box' : roll < 0.8 ? 'sphere' : 'cylinder', color);
          }
        }
      });

      AFRAME.registerComponent('dropper', {
        init: function () {
          this.timer = 0;
          this.nextDrop = 0;
        },
        tick: function (time) {
          if (time < this.nextDrop) return;
          this.nextDrop = time + 2500;

          const scene = this.el.sceneEl;
          const obj = document.createElement('a-entity');
          const shape = Math.random() < 0.5 ? 'box' : 'sphere';
          const color = ['#ffafcc', '#caffbf', '#9bf6ff', '#ffd6a5'][(Math.random() * 4) | 0];

          if (shape === 'box') {
            obj.setAttribute('geometry', 'primitive: box; width: 0.15; height: 0.15; depth: 0.15');
          } else {
            obj.setAttribute('geometry', 'primitive: sphere; radius: 0.085');
          }

          obj.setAttribute('material', `color: ${color}; roughness: 0.65`);
          obj.setAttribute('class', 'grabbable');
          obj.setAttribute('dynamic-body', 'shape: box; mass: 1');
          obj.setAttribute('buoyancy', '');
          obj.setAttribute('position', `${(Math.random() * 1.8 - 0.9).toFixed(2)} 2.7 ${(Math.random() * 1.8 - 0.9).toFixed(2)}`);
          scene.appendChild(obj);

          setTimeout(() => {
            if (!obj.body) return;
            obj.body.velocity.set((Math.random() - 0.5) * 1.4, -0.2, (Math.random() - 0.5) * 1.4);
          }, 80);
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      physics="gravity: -9.8; friction: 0.9; restitution: 0.15"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      background="color: #0a1020"
      vr-mode-ui="enabled: true"
      loading-screen="enabled: false"
    >
      <a-assets>
        <img id="grid" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256' viewBox='0 0 256 256'><rect width='256' height='256' fill='%230b1324'/><path d='M0 32H256M0 64H256M0 96H256M0 128H256M0 160H256M0 192H256M0 224H256M32 0V256M64 0V256M96 0V256M128 0V256M160 0V256M192 0V256M224 0V256' stroke='%23172a46' stroke-width='2'/></svg>">
      </a-assets>

      <a-sky color="#0a1020"></a-sky>

      <a-entity light="type: ambient; intensity: 0.65; color: #bcdcff"></a-entity>
      <a-entity light="type: directional; intensity: 1.1; color: #ffffff" position="2 5 3"></a-entity>

      <a-plane
        rotation="-90 0 0"
        width="40"
        height="40"
        src="#grid"
        repeat="12 12"
        material="color: #122235; roughness: 1"
        static-body>
      </a-plane>

      <a-box
        position="0 0.25 0"
        width="2.2"
        height="0.5"
        depth="2.2"
        material="color: #1a2d44; roughness: 1"
        static-body>
      </a-box>

      <a-box id="water"
        position="0 0.35 0"
        width="6"
        height="0.56"
        depth="6"
        material="color: #3aa6ff; opacity: 0.36; transparent: true; roughness: 0.1; metalness: 0"
        buoyancy="width: 6; depth: 6; height: 0.56"
        static-body>
      </a-box>

      <a-box position="0 0.08 0" width="6.4" height="0.02" depth="6.4" material="color: #69bffb; opacity: 0.08; transparent: true" static-body></a-box>

      <a-box position="0 1.6 -3.1" width="7.5" height="3.2" depth="0.1" material="opacity: 0" static-body></a-box>
      <a-box position="0 1.6 3.1" width="7.5" height="3.2" depth="0.1" material="opacity: 0" static-body></a-box>
      <a-box position="-3.75 1.6 0" width="0.1" height="3.2" depth="6.2" material="opacity: 0" static-body></a-box>
      <a-box position="3.75 1.6 0" width="0.1" height="3.2" depth="6.2" material="opacity: 0" static-body></a-box>
      <a-box position="0 3.2 0" width="7.5" height="0.1" depth="6.2" material="opacity: 0" static-body></a-box>

      <a-entity dropper></a-entity>

      <a-entity position="-0.9 1.45 1.1" rotation="0 0 0">
        <a-sphere radius="0.11" material="color: #f8f9fa; roughness: 0.4" class="grabbable" dynamic-body="shape: sphere; mass: 1" buoyancy></a-sphere>
      </a-entity>

      <a-entity position="0.0 1.45 1.1">
        <a-box width="0.16" height="0.16" depth="0.16" material="color: #ffb703; roughness: 0.5" class="grabbable" dynamic-body="shape: box; mass: 1" buoyancy></a-box>
      </a-entity>

      <a-entity position="0.9 1.45 1.1">
        <a-cylinder radius="0.08" height="0.18" material="color: #90e0ef; roughness: 0.45" class="grabbable" dynamic-body="shape: box; mass: 1" buoyancy></a-cylinder>
      </a-entity>

      <a-entity
        id="leftHand"
        hand-controls="hand: left"
        grab-controller
        spawn-tool="mode: box"
        position="-0.25 1.4 -0.6">
      </a-entity>

      <a-entity
        id="rightHand"
        hand-controls="hand: right"
        grab-controller
        spawn-tool="mode: random"
        position="0.25 1.4 -0.6">
      </a-entity>

      <a-entity
        id="cameraRig"
        position="0 1.6 2.8">
        <a-camera
          look-controls
          wasd-controls="enabled: true"
          position="0 0 0">
        </a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
